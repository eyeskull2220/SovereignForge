name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          # Test harness
          pip install pytest pytest-asyncio pytest-cov pytest-timeout

          # Core deps (CPU-only torch for CI)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pandas scikit-learn

          # Async / networking
          pip install aiohttp websockets httpx

          # Exchange connectivity
          pip install ccxt

          # Database / caching
          pip install aiosqlite

          # Alerts
          pip install python-telegram-bot

          # Utilities
          pip install python-dotenv structlog

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python -m pytest tests/ \
            -v --tb=short --no-header \
            --ignore=tests/test_websocket_integration.py \
            --ignore=tests/test_integration.py \
            -m "not gpu and not network and not slow" \
            --timeout=60

      - name: MiCA compliance check — zero USDT refs in src/
        run: |
          echo "Scanning for USDT violations..."
          violations=$(grep -rn "USDT" src/ --include="*.py" \
            | grep -v "NO USDT\|USDT ALLOWED\|USDT PAIRS\|compliance.py:3[89]\|gpu_accelerated" \
            | wc -l)
          echo "USDT violations found: $violations"
          if [ "$violations" -gt 0 ]; then
            grep -rn "USDT" src/ --include="*.py" \
              | grep -v "NO USDT\|USDT ALLOWED\|USDT PAIRS\|compliance.py:3[89]\|gpu_accelerated"
            echo "::error::MiCA violation: USDT references found in src/"
            exit 1
          fi
          echo "MiCA compliance check passed"
