version: '3.8'

services:
  sovereignforge:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sovereignforge-arbitrage
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Core application settings
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO

      # MiCA Compliance (MANDATORY)
      - MICA_COMPLIANCE_ENABLED=true
      - LOCAL_EXECUTION_ONLY=true
      - NO_CUSTODY_MODE=true
      - COMPLIANCE_LOG_LEVEL=WARNING

      # GPU Configuration
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
      - GPU_MEMORY_LIMIT_MB=12288

      # Security settings
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONHASHSEED=random

      # Telegram alerts (optional)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_IDS=${TELEGRAM_CHAT_IDS:-}
      - TELEGRAM_ENABLED=${TELEGRAM_ENABLED:-false}

      # Risk management settings
      - MAX_POSITION_SIZE_PCT=0.02
      - MAX_PORTFOLIO_RISK_PCT=0.05
      - MAX_DAILY_LOSS_PCT=0.03
      - MAX_OPEN_POSITIONS=5

    volumes:
      - ../logs:/app/logs:rw
      - ../data:/app/data:rw
      - ../models:/app/models:ro
      - ../secrets:/app/secrets:ro
    networks:
      - sovereignforge-network

    # GPU resource allocation
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '4.0'
        reservations:
          memory: 8G
          cpus: '2.0'
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # Security constraints
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

    # Health monitoring
    healthcheck:
      test: ["CMD", "python3", "-c", "import torch; exit(0 if torch.cuda.is_available() else 1)"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Redis for caching (if needed)
  redis:
    image: redis:7-alpine
    container_name: sovereignforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sovereignforge-network
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Monitoring with Prometheus metrics
  # WARNING: Prometheus should be behind a reverse proxy with auth in production
  prometheus:
    image: prom/prometheus:latest
    container_name: sovereignforge-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"  # Put behind auth proxy in production
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - sovereignforge-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'

networks:
  sovereignforge-network:
    driver: bridge

volumes:
  redis_data:
  prometheus_data: