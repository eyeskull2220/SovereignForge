apiVersion: v1
kind: ConfigMap
metadata:
  name: sovereignforge-config
  namespace: sovereignforge
  labels:
    app: sovereignforge
data:
  # Application Configuration
  LOG_LEVEL: "INFO"
  PYTHONPATH: "/app"
  PRODUCTION: "true"

  # GPU Configuration
  CUDA_VISIBLE_DEVICES: "0"
  PYTORCH_CUDA_ALLOC_CONF: "max_split_size_mb:512"
  GPU_MEMORY_FRACTION: "0.8"
  GPU_MEMORY_LIMIT_MB: "12288"

  # MiCA Compliance Configuration
  MICA_COMPLIANCE_ENABLED: "true"
  ALLOWED_ASSETS: "XRP,XLM,HBAR,ALGO,ADA,LINK,IOTA,XDC,ONDO,VET,USDC,RLUSD"
  RISK_MANAGEMENT_ENABLED: "true"
  MAX_POSITION_SIZE_PCT: "0.02"
  STOP_LOSS_PCT: "0.05"
  TAKE_PROFIT_PCT: "0.10"

  # Circuit Breaker Configuration
  CIRCUIT_BREAKER_ENABLED: "true"
  CIRCUIT_BREAKER_FAILURE_THRESHOLD: "5"
  CIRCUIT_BREAKER_RECOVERY_TIMEOUT: "120"
  CIRCUIT_BREAKER_MONITOR_INTERVAL: "30"

  # WebSocket Configuration
  WEBSOCKET_ENABLED: "true"
  WEBSOCKET_RECONNECT_ENABLED: "true"
  WEBSOCKET_HEARTBEAT_INTERVAL: "30"
  WEBSOCKET_CONNECTION_TIMEOUT: "10"

  # Database Configuration
  REDIS_ENABLED: "true"
  REDIS_HOST: "sovereignforge-redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"

  # Monitoring Configuration
  PROMETHEUS_ENABLED: "true"
  METRICS_PORT: "9090"
  HEALTH_CHECK_INTERVAL: "30"

  # Security Configuration
  TLS_ENABLED: "true"
  API_RATE_LIMIT: "100"
  MAX_CONNECTIONS: "1000"

  # Model Configuration
  MODEL_PATH: "/app/models"
  INFERENCE_BATCH_SIZE: "32"
  MAX_SEQUENCE_LENGTH: "512"
  CONFIDENCE_THRESHOLD: "0.85"