apiVersion: v1
kind: Secret
metadata:
  name: sovereignforge-secrets
  namespace: sovereignforge
  labels:
    app: sovereignforge
type: Opaque
data:
  # Base64 encoded secrets - REPLACE WITH ACTUAL VALUES
  # Generate with: echo -n 'your-secret' | base64

  # Exchange API Keys (base64 encoded)
  binance-api-key: ""  # TODO: Fill with base64 encoded API key
  binance-api-secret: ""  # TODO: Fill with base64 encoded API secret
  coinbase-api-key: ""  # TODO: Fill with base64 encoded API key
  coinbase-api-secret: ""  # TODO: Fill with base64 encoded API secret

  # Database credentials
  redis-url: "cmVkaXM6Ly9zb3ZlcmVpZ25mb3JnZS1yZWRpczo2Mzc5LzA="  # redis://sovereignforge-redis:6379/0
  redis-password: ""  # TODO: Fill if Redis has password

  # JWT and encryption keys
  jwt-secret-key: ""  # TODO: Generate strong random key
  encryption-key: ""  # TODO: Generate AES-256 key

  # WebSocket authentication
  websocket-auth-token: ""  # TODO: Generate secure token

  # TLS certificates (if using TLS)
  tls-cert: ""  # TODO: Base64 encoded certificate
  tls-key: ""  # TODO: Base64 encoded private key

  # Monitoring and alerting
  slack-webhook-url: ""  # TODO: Slack webhook for alerts
  telegram-bot-token: ""  # TODO: Telegram bot token
  telegram-chat-id: ""  # TODO: Telegram chat ID

---
# Example of how to create the secret with actual values:
# kubectl create secret generic sovereignforge-secrets \
#   --from-literal=binance-api-key='your-binance-api-key' \
#   --from-literal=binance-api-secret='your-binance-api-secret' \
#   --from-literal=redis-url='redis://sovereignforge-redis:6379/0' \
#   --namespace sovereignforge