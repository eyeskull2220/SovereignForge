apiVersion: v1
kind: Service
metadata:
  name: sovereignforge-service
  namespace: sovereignforge
  labels:
    app: sovereignforge
spec:
  selector:
    app: sovereignforge
    component: inference
  ports:
  - name: api
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: sovereignforge-loadbalancer
  namespace: sovereignforge
  labels:
    app: sovereignforge
spec:
  selector:
    app: sovereignforge
    component: inference
  ports:
  - name: api
    port: 80
    targetPort: 8000
    protocol: TCP
  type: LoadBalancer
  loadBalancerIP: ""