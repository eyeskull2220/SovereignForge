apiVersion: v1
kind: Secret
metadata:
  name: sovereignforge-secrets
  namespace: trading
  labels:
    app: sovereignforge
type: Opaque
data:
  # Base64 encoded secrets - REPLACE WITH YOUR ACTUAL VALUES
  # To encode: echo -n "your_actual_token" | base64

  # Telegram Bot Token (required for alerts)
  telegram-bot-token: "REPLACE_WITH_BASE64_ENCODED_TELEGRAM_BOT_TOKEN"

  # xAI API Key (required for Grok reasoning)
  xai-api-key: "REPLACE_WITH_BASE64_ENCODED_XAI_API_KEY"

  # Exchange API Keys (optional - for enhanced data sources)
  binance-api-key: "REPLACE_WITH_BASE64_ENCODED_BINANCE_API_KEY"
  binance-secret-key: "REPLACE_WITH_BASE64_ENCODED_BINANCE_SECRET"
  coinbase-api-key: "REPLACE_WITH_BASE64_ENCODED_COINBASE_API_KEY"
  coinbase-secret-key: "REPLACE_WITH_BASE64_ENCODED_COINBASE_SECRET"

  # Database credentials (if using external database)
  # db-username: "REPLACE_WITH_BASE64_ENCODED_DB_USERNAME"
  # db-password: "REPLACE_WITH_BASE64_ENCODED_DB_PASSWORD"

---
# Instructions for encoding secrets:
# Run these commands to encode your secrets:
#
# echo -n "your_telegram_bot_token_here" | base64
# echo -n "your_xai_api_key_here" | base64
# echo -n "your_binance_api_key_here" | base64
# echo -n "your_binance_secret_here" | base64
#
# Then replace the placeholder values above with the base64 output.
#
# NEVER commit actual secret values to version control!