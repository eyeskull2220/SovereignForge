apiVersion: v1
kind: Service
metadata:
  name: sovereignforge-service
  namespace: trading
  labels:
    app: sovereignforge
    component: arbitrage-engine
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: sovereignforge
    component: arbitrage-engine

---
apiVersion: v1
kind: Service
metadata:
  name: sovereignforge-service-external
  namespace: trading
  labels:
    app: sovereignforge
    component: arbitrage-engine
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: sovereignforge
    component: arbitrage-engine
  loadBalancerIP: ""  # Assign static IP if needed